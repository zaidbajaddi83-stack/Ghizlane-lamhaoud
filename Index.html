<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pour Ghizlane 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <!-- شاشة البداية -->
    <div id="start-screen">
        <h1 class="main-title">Pour toi, <span>Ghizlane</span></h1>
        <button id="startBtn">Ouvrir Votre cadeau ✨</button>
    </div>

    <!-- المشهد الرئيسي -->
    <div id="main-scene" style="display:none;">
        <div class="heart-3d">
            <div class="heart-half left"></div>
            <div class="heart-half right"></div>
        </div>

        <div class="letter-box">
            <h2 class="letter-header">Ghizlane 💖</h2>
            <p id="typing-text"></p>
            <div id="signature">Zaid Bajaddi</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
